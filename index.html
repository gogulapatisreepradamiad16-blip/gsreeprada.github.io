<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreeprada Goguapati | Faculty Portfolio & Research Repository</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5ef;
            --text: #111111;
            --accent: #7b5e3b;
            --light: #ebe4d8;
            --white: #ffffff;
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            --font-label: 'Space Grotesk', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
        
        h1, h2, h3, .serif-quote { font-family: var(--font-heading); font-weight: 500; }
        .label { font-family: var(--font-label); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }

        nav { position: fixed; top: 0; width: 100%; padding: 25px 6%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; backdrop-filter: blur(12px); background: rgba(248, 245, 239, 0.85); border-bottom: 1px solid rgba(0,0,0,0.03); }
        .logo { font-family: var(--font-label); font-size: 13px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: var(--text); font-weight: 500; }
        nav ul { display: flex; gap: 35px; list-style: none; }
        nav a { text-decoration: none; color: var(--text); font-size: 13px; letter-spacing: 1px; font-family: var(--font-label); text-transform: uppercase; transition: color 0.3s; }
        nav a:hover, nav a.active { color: var(--accent); }

        section { padding: 120px 6% 80px 6%; position: relative; }
        .hero { height: 100vh; display: flex; align-items: center; padding-top: 80px; position: relative; overflow: hidden; background: transparent; }
        
        .hero-content { position: relative; z-index: 10; max-width: 1000px; }
        .hero h1 { font-size: clamp(3.5rem, 8vw, 7.5rem); line-height: 0.9; margin-bottom: 30px; letter-spacing: -2px; }
        .hero p { max-width: 750px; font-size: 1.25rem; font-weight: 300; color: #222; line-height: 1.7; }

        /* Pure CSS Image Tiling Grid - Completely eliminates SVG rendering issues */
        .blueprint-canvas-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 150%; /* Accounts for down-scroll parallax offset headroom */
            z-index: 1;
            opacity: 0.15; /* Transparent rendering layer */
            pointer-events: none;
            overflow: hidden;
            background-image: url('assets/images/flower of life.png');
            background-repeat: repeat;
            background-size: 320px auto; /* Scaled down for subtle geometric background texture */
            background-position: center top;
            will-change: transform;
        }
        
        .manifesto-block { max-width: 1100px; margin: 40px 0; border-left: 2px solid var(--accent); padding-left: 40px; }
        .manifesto-text { font-size: clamp(1.6rem, 3vw, 2.6rem); line-height: 1.3; color: var(--text); font-style: italic; }

        .section-header { border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 20px; margin-bottom: 60px; display: flex; justify-content: space-between; align-items: flex-end; }
        .section-header h2 { font-size: 2.8rem; }
        
        .featured-editorial-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 60px; margin-bottom: 100px; align-items: center; position: relative; z-index: 5; }
        .editorial-image-pane { background: var(--light); min-height: 480px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .editorial-image-pane img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
        .editorial-text-pane { padding: 20px 0; }
        .editorial-text-pane h3 { font-size: 2.5rem; margin: 15px 0; line-height: 1.15; }
        .editorial-text-pane p { color: #444; margin-bottom: 30px; font-size: 1.05rem; }
